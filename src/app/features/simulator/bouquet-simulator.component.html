<section class="mx-auto max-w-[1600px] px-4 py-5 sm:px-6 lg:px-8">
  <header class="mb-5 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <div class="grid h-10 w-10 place-items-center rounded-xl bg-emerald-950 text-xl text-white">✽</div>
      <div>
        <h1 class="text-xl font-semibold tracking-tight text-stone-900">Strauß</h1>
        <p class="text-xs text-stone-400">{{ store.flowerCount() }} Blumen</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <label class="grid h-10 w-10 cursor-pointer place-items-center rounded-xl border border-stone-200 bg-white text-lg transition hover:bg-stone-50" title="Projekt laden">
        ↥
        <input class="sr-only" type="file" accept="application/json,.json" (change)="importProject($event)">
      </label>
      <button class="grid h-10 w-10 place-items-center rounded-xl border border-stone-200 bg-white text-lg transition hover:bg-stone-50" type="button" title="Exportieren" (click)="exportProject()">↓</button>
      <button class="h-10 rounded-xl bg-emerald-950 px-4 text-sm font-semibold text-white transition hover:bg-emerald-900" type="button" (click)="pickerOpen.set(true)">＋ Blume</button>
    </div>
  </header>

  @if (importError()) {
    <div class="mb-4 rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-xs text-rose-800">{{ importError() }}</div>
  }

  <div class="grid min-h-[calc(100vh-145px)] gap-4 lg:grid-cols-[190px_minmax(0,1fr)]">
    <aside class="order-2 flex gap-2 overflow-x-auto lg:order-1 lg:flex-col lg:overflow-visible">
      <section class="min-w-48 rounded-2xl border border-stone-200 bg-white p-3 shadow-sm">
        <div class="mb-2 flex items-center justify-between text-[10px] font-bold uppercase tracking-wider text-stone-400">
          <label for="rotation">Drehung</label>
          <output>{{ rotationDegrees() }}°</output>
        </div>
        <input
          id="rotation"
          class="w-full accent-emerald-900"
          type="range"
          min="0"
          max="360"
          [value]="rotationDegrees()"
          (input)="setRotationFromDegrees($any($event.target).value)"
        >
      </section>

      @if (selectedId()) {
        <section class="min-w-48 rounded-2xl border border-emerald-200 bg-emerald-50 p-3">
          <div class="mb-3 flex items-center gap-2 text-xs font-semibold text-emerald-950">
            <span class="h-2 w-2 rounded-full bg-emerald-700"></span>
            Ausgewählt
          </div>
          <div class="flex gap-2 lg:grid">
            <button class="rounded-lg bg-white px-2 py-2 text-[10px] font-semibold text-stone-600 hover:bg-stone-50" type="button" (click)="resetSelectedNodes()">↶ Knoten</button>
            <button class="rounded-lg px-2 py-2 text-[10px] font-semibold text-rose-700 hover:bg-rose-100" type="button" (click)="deleteSelected()">× Entfernen</button>
          </div>
        </section>
      }

      <button class="min-w-32 rounded-xl px-3 py-2 text-xs font-semibold text-stone-400 transition hover:bg-stone-100 hover:text-stone-700 lg:mt-auto" type="button" (click)="store.resetBouquet(); selectedId.set(null)">Alles leeren</button>
    </aside>

    <div class="relative order-1 min-h-[560px] overflow-hidden rounded-3xl border border-stone-200 bg-[#f8f7f2] shadow-sm lg:order-2">
      <div class="pointer-events-none absolute left-1/2 top-4 z-10 -translate-x-1/2 rounded-full border border-white/60 bg-white/75 px-3 py-1.5 text-[10px] font-semibold text-stone-400 backdrop-blur">
        Freie Fläche drehen · Punkte bewegen
      </div>
      <app-bouquet-canvas
        class="block h-full"
        [state]="store.state()"
        [definitions]="store.definitions()"
        [selectedId]="selectedId()"
        (nodeDrag)="moveNode($event)"
        (rotateDrag)="store.rotateBy($event)"
        (selectionChange)="selectedId.set($event)"
      />
    </div>
  </div>
</section>

@if (pickerOpen()) {
  <div class="fixed inset-0 z-50 grid place-items-center bg-stone-950/35 p-4 backdrop-blur-sm" (click)="pickerOpen.set(false)">
    <section class="max-h-[85vh] w-full max-w-3xl overflow-auto rounded-3xl bg-white p-5 shadow-2xl" role="dialog" aria-modal="true" aria-labelledby="picker-title" (click)="$event.stopPropagation()">
      <header class="mb-5 flex items-center justify-between">
        <h2 id="picker-title" class="text-lg font-semibold tracking-tight text-stone-900">Blume wählen</h2>
        <button class="grid h-9 w-9 place-items-center rounded-xl bg-stone-100 text-lg hover:bg-stone-200" type="button" aria-label="Schließen" (click)="pickerOpen.set(false)">×</button>
      </header>
      <div class="grid grid-cols-2 gap-3 sm:grid-cols-3">
        @for (flower of store.definitions(); track flower.id) {
          <button class="group overflow-hidden rounded-2xl border border-stone-200 bg-stone-50 text-left transition hover:-translate-y-0.5 hover:border-emerald-300 hover:bg-white hover:shadow-md" type="button" (click)="addFlower(flower.id)">
            <span class="grid aspect-square place-items-center overflow-hidden bg-[#f3f1ea] p-8">
              @if (previewGraphic(flower); as preview) {
                <img class="h-full w-full object-contain transition duration-200 group-hover:scale-110" [src]="preview" alt="">
              } @else {
                <span class="text-5xl text-stone-300">○</span>
              }
            </span>
            <span class="block p-3">
              <strong class="block truncate text-sm text-stone-800">{{ flower.name }}</strong>
              <small class="text-[10px] text-stone-400">{{ flower.nodes.length }} Knoten</small>
            </span>
          </button>
        }
      </div>
    </section>
  </div>
}
