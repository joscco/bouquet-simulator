<div class="fixed inset-0 z-50 grid place-items-center bg-stone-950/35 p-4 backdrop-blur-sm" (click)="close.emit()">
  <section
    class="max-h-[85vh] w-full max-w-3xl overflow-auto rounded-3xl bg-white p-5 shadow-2xl"
    role="dialog"
    aria-modal="true"
    aria-labelledby="picker-title"
    (click)="$event.stopPropagation()"
  >
    <header class="mb-4 flex items-center justify-between">
      <h2 id="picker-title" class="text-lg font-semibold tracking-tight text-stone-900">{{ 'picker.title' | transloco }}</h2>
      <button app-button variant="icon" [attr.aria-label]="'common.close' | transloco" (click)="close.emit()">
        <mat-icon>close</mat-icon>
      </button>
    </header>
    <label class="relative mb-3 block">
      <mat-icon class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-[19px]! text-stone-400">search</mat-icon>
      <input
        class="h-10 w-full rounded-xl border border-stone-300 bg-stone-50 pl-10 pr-3 text-sm text-stone-800 outline-none transition focus:border-emerald-700 focus:bg-white focus:ring-3 focus:ring-emerald-700/10"
        type="search"
        [placeholder]="'picker.search' | transloco"
        [value]="search()"
        (input)="search.set($any($event.target).value)"
      >
    </label>
    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3">
      @for (flower of filteredFlowers(); track flower.id) {
        <button
          class="group grid min-h-52 overflow-hidden rounded-2xl border border-stone-200 bg-stone-50 text-left transition hover:-translate-y-0.5 hover:border-emerald-300 hover:bg-white hover:shadow-md focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-700"
          type="button"
          (click)="flowerSelect.emit(flower.id)"
        >
          <span class="relative min-h-40 overflow-hidden bg-[radial-gradient(circle_at_50%_55%,rgba(255,255,255,1),rgba(245,245,244,.55)_65%,rgba(231,229,228,.7))] p-2">
            <app-flower-thumbnail
              class="transition duration-200 group-hover:scale-[1.04]"
              [definition]="flower"
            />
          </span>
          <span class="flex min-w-0 items-center gap-2 border-t border-stone-200/80 bg-white/90 px-3 py-2.5">
            <span class="min-w-0 flex-1">
              <strong class="block truncate text-sm text-stone-800">{{ flower.name }}</strong>
              <small class="mt-0.5 block text-[10px] text-stone-400">{{ flower.nodes.length }} {{ 'picker.nodes' | transloco }}</small>
            </span>
            <mat-icon class="shrink-0 text-stone-400 transition group-hover:text-emerald-800">add</mat-icon>
          </span>
        </button>
      } @empty {
        <div class="px-4 py-10 text-center text-sm text-stone-400">{{ 'common.emptySearch' | transloco }}</div>
      }
    </div>
  </section>
</div>
