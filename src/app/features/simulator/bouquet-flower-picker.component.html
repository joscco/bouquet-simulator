<div class="fixed inset-0 z-50 grid place-items-center bg-stone-950/35 p-4 backdrop-blur-sm" (click)="close.emit()">
  <section
    class="max-h-[85vh] w-full max-w-3xl overflow-auto rounded-3xl bg-white p-5 shadow-2xl"
    role="dialog"
    aria-modal="true"
    aria-labelledby="picker-title"
    (click)="$event.stopPropagation()"
  >
    <header class="mb-5 flex items-center justify-between">
      <h2 id="picker-title" class="text-lg font-semibold tracking-tight text-stone-900">Blume wählen</h2>
      <button mat-icon-button type="button" aria-label="Schließen" (click)="close.emit()">
        <mat-icon>close</mat-icon>
      </button>
    </header>
    <div class="grid grid-cols-1 gap-2">
      @for (flower of flowers(); track flower.id) {
        <button
          class="flex items-center justify-start gap-2 overflow-hidden rounded-2xl border border-stone-200 bg-stone-50 p-2 text-left transition hover:-translate-y-0.5 hover:border-emerald-300 hover:bg-white hover:shadow-md"
          type="button"
          (click)="flowerSelect.emit(flower.id)"
        >
          <span class="text-5xl transition duration-200 group-hover:scale-110" [style.color]="previewColor(flower)">
            {{ previewSymbol(flower) }}
          </span>
          <strong class="block truncate text-sm text-stone-800">{{ flower.name }}</strong>
          <small class="text-[10px] text-stone-400">{{ flower.nodes.length }} Knoten</small>
        </button>
      }
    </div>
  </section>
</div>
