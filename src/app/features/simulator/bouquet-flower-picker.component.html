<div class="fixed inset-0 z-50 grid place-items-center bg-stone-950/35 p-4 backdrop-blur-sm" (click)="close.emit()">
  <section
    class="max-h-[85vh] w-full max-w-3xl overflow-auto rounded-3xl bg-white p-5 shadow-2xl"
    role="dialog"
    aria-modal="true"
    aria-labelledby="picker-title"
    (click)="$event.stopPropagation()"
  >
    <header class="mb-5 flex items-center justify-between">
      <h2 id="picker-title" class="text-lg font-semibold tracking-tight text-stone-900">Blume wählen</h2>
      <button mat-icon-button type="button" aria-label="Schließen" (click)="close.emit()">
        <mat-icon>close</mat-icon>
      </button>
    </header>
    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3">
      @for (flower of flowers(); track flower.id) {
        <button
          class="group grid min-h-52 grid-rows-[minmax(0,1fr)_auto] overflow-hidden rounded-2xl border border-stone-200 bg-stone-50 text-left transition hover:-translate-y-0.5 hover:border-emerald-300 hover:bg-white hover:shadow-md"
          type="button"
          (click)="flowerSelect.emit(flower.id)"
        >
          <span class="relative min-h-40 overflow-hidden bg-[radial-gradient(circle_at_50%_55%,rgba(255,255,255,1),rgba(245,245,244,.55)_65%,rgba(231,229,228,.7))] p-2">
            <app-flower-thumbnail
              class="transition duration-200 group-hover:scale-[1.04]"
              [definition]="flower"
            />
          </span>
          <span class="flex min-w-0 items-baseline justify-between gap-2 border-t border-stone-200/80 bg-white/80 px-3 py-2.5">
            <strong class="min-w-0 truncate text-sm text-stone-800">{{ flower.name }}</strong>
            <small class="shrink-0 text-[10px] text-stone-400">{{ flower.nodes.length }} Knoten</small>
          </span>
        </button>
      }
    </div>
  </section>
</div>
