<section class="relative h-full min-h-0 overflow-hidden rounded-2xl border border-stone-200 bg-[#f8f7f2] lg:col-start-3 lg:row-start-1 lg:m-3 lg:mt-18 lg:h-auto">
  <span class="pointer-events-none absolute left-3 top-3 z-10 text-[9px] font-bold uppercase tracking-widest text-stone-400">{{ 'editor.preview' | transloco }}</span>
  <div class="absolute right-3 top-3 z-20 flex min-w-0 items-center gap-1 rounded-[10px] border border-stone-200 bg-white/90 p-1 shadow-sm">
    <button app-button variant="icon" [matTooltip]="'editor.centerView' | transloco" [attr.aria-label]="'editor.centerView' | transloco" (click)="resetView()">
      <mat-icon>center_focus_strong</mat-icon>
    </button>
    <button app-button variant="icon" [matTooltip]="'editor.regenerate' | transloco" [attr.aria-label]="'editor.regenerate' | transloco" (click)="regenerate()">
      <mat-icon>refresh</mat-icon>
    </button>
  </div>
  <app-bouquet-canvas
    class="block h-full"
    [state]="state()"
    [definitions]="definitions()"
    [zoom]="zoom()"
    [zoomEnabled]="true"
    [fitToContent]="true"
    [orbitEnabled]="true"
    [orbitPitch]="pitch()"
    viewMode="rotate"
    [viewOffset]="viewOffset()"
    (zoomChange)="zoom.set($event)"
    (orbitDrag)="orbit($event)"
    (viewPan)="pan($event)"
    [highlightedNodeIds]="highlightedNodeIds()"
    [highlightedConnection]="highlightedConnection()"
  />
</section>
