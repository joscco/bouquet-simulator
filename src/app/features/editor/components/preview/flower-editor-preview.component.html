<section class="relative h-full min-h-0 overflow-hidden rounded-none border-0 bg-[#f8f7f2]">
  <app-preview-toolbar (centerView)="resetView()" (regeneratePreview)="regenerate()" />
  @if (highlightedConnection()) {
    <div class="preview-direction-legend pointer-events-none absolute bottom-3 left-3 z-20 space-y-1 rounded-lg border border-stone-200 bg-white/90 px-2.5 py-2 text-[9px] font-semibold text-stone-600 shadow-sm">
      <div class="flex items-center gap-1.5">
        <svg class="h-3 w-5 shrink-0" viewBox="0 0 20 12" aria-hidden="true">
          <path d="M1 6h14M11 2l4 4-4 4" fill="none" stroke="#f59e0b" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
        </svg>
        <span>{{ 'editor.baseDirection' | transloco }}</span>
      </div>
      <div class="flex items-center gap-1.5">
        <svg class="h-3 w-5 shrink-0" viewBox="0 0 20 12" aria-hidden="true">
          <path d="M1 6h14M11 2l4 4-4 4" fill="none" stroke="#10b981" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
        </svg>
        <span>{{ 'editor.mainDirection' | transloco }}</span>
      </div>
    </div>
  }
  <app-bouquet-canvas
    class="block h-full"
    [state]="state()"
    [definitions]="definitions()"
    [zoom]="zoom()"
    [zoomEnabled]="true"
    [fitToContent]="true"
    [viewportInsets]="viewportInsets()"
    [orbitEnabled]="true"
    [orbitPitch]="pitch()"
    viewMode="rotate"
    [viewOffset]="viewOffset()"
    (zoomChange)="zoom.set($event)"
    (orbitDrag)="orbit($event)"
    (viewPan)="pan($event)"
    [highlightedNodeIds]="highlightedNodeIds()"
    [highlightedConnection]="highlightedConnection()"
  />
</section>
