<svg
  #graphCanvas
  class="pointer-events-none h-full min-h-0 w-full touch-none select-none"
  [attr.viewBox]="graphViewBox()"
  preserveAspectRatio="xMidYMid meet"
  role="tree"
  aria-label="Kompakter Knotengraph"
  (pointermove)="graphPointerMove($event)"
  (pointerup)="graphPointerUp($event)"
  (pointercancel)="graphPointerUp($event)"
  (wheel)="graphWheel($event)"
>
  <defs>
    <pattern id="compact-graph-grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#d6d3d1" opacity=".45" />
    </pattern>
  </defs>
  <rect
    x="-5000"
    y="-5000"
    width="10000"
    height="10000"
    fill="url(#compact-graph-grid)"
    class="pointer-events-auto cursor-grab active:cursor-grabbing"
    (pointerdown)="graphPointerDown($event)"
  />

  @for (loop of compactGraph().loops; track loop.id) {
    <g
      class="pointer-events-auto cursor-pointer outline-none"
      [attr.opacity]="isActiveNode(loop.id) ? 1 : 0.72"
      tabindex="0"
      role="treeitem"
      [attr.aria-label]="loop.name + ', ' + loop.label"
      [attr.aria-selected]="selectedNodeId() === loop.id"
      (pointerdown)="selectCompactNode($event, loop.id)"
      (pointerup)="finishConnection($event, loop.id)"
      (keydown.enter)="selectNodeFromKeyboard($event, loop.id)"
      (keydown.space)="$event.preventDefault(); selectNodeFromKeyboard($event, loop.id)"
    >
      <rect
        [attr.x]="loop.x"
        [attr.y]="loop.y"
        [attr.width]="loop.width"
        [attr.height]="loop.height"
        rx="16"
        fill="#fffcf2"
        fill-opacity=".94"
        [attr.stroke]="selectedNodeId() === loop.id ? '#d97706' : isSubtreeNodeSelected(loop.id) ? '#2dd4bf' : '#f59e0b'"
        [attr.stroke-width]="selectedNodeId() === loop.id ? 4 : 2.5"
      />
      <rect
        [attr.x]="loop.x + 8"
        [attr.y]="loop.y + 8"
        [attr.width]="loop.width - 16"
        height="28"
        rx="10"
        fill="#fffbeb"
        stroke="#fde68a"
        stroke-width="1"
        class="pointer-events-none"
      />
      <text [attr.x]="loop.x + 16" [attr.y]="loop.y + 26" class="pointer-events-none fill-amber-900 text-[9px] font-bold">{{ loop.label }} ↻ {{ loop.compactName }}</text>
      <title>{{ loop.name }} · {{ loop.label }}</title>
    </g>
  }

  @for (edge of compactGraph().edges; track edge.key) {
    <path
      [attr.d]="edge.path"
      fill="none"
      stroke="transparent"
      stroke-width="20"
      class="pointer-events-auto cursor-pointer"
      (pointerdown)="selectConnection($event, edge.targetId)"
    />
    <path
      [attr.d]="edge.path"
      fill="none"
      stroke="#ffffff"
      stroke-width="6"
      stroke-linecap="round"
      stroke-opacity=".75"
      class="pointer-events-none"
    />
    <path
      [attr.d]="edge.path"
      fill="none"
      [attr.stroke]="isSubtreeEdge(edge.sourceId, edge.targetId) ? '#0f766e' : selectedNodeId() === edge.targetId ? '#047857' : '#a8a29e'"
      [attr.stroke-width]="isSubtreeEdge(edge.sourceId, edge.targetId) ? 4.5 : selectedNodeId() === edge.targetId ? 4 : 2.75"
      stroke-linecap="round"
      [attr.opacity]="isActiveEdge(edge.sourceId, edge.targetId) ? 1 : 0.25"
      class="pointer-events-none"
    />
  }

  @if (connectionDrag(); as pending) {
    <path
      [attr.d]="pendingConnectionPath()"
      fill="none"
      stroke="#047857"
      stroke-width="2.5"
      stroke-dasharray="5 4"
      stroke-linecap="round"
      class="pointer-events-none"
    />
  }

  @for (node of compactGraph().nodes; track node.id) {
    @if (!node.loop) {
    <g
      class="pointer-events-auto cursor-pointer outline-none"
      [attr.transform]="'translate(' + node.x + ' ' + node.y + ')'"
      [attr.opacity]="isActiveNode(node.id) ? 1 : 0.58"
      tabindex="0"
      role="treeitem"
      [attr.aria-label]="node.name"
      [attr.aria-selected]="selectedNodeId() === node.id"
      (pointerdown)="selectCompactNode($event, node.id)"
      (pointerup)="finishConnection($event, node.id)"
      (keydown.enter)="selectNodeFromKeyboard($event, node.id)"
      (keydown.space)="$event.preventDefault(); selectNodeFromKeyboard($event, node.id)"
      (dblclick)="node.componentDefinitionId && openComponent($event, node.componentDefinitionId)"
    >
      <rect
        [attr.x]="-node.compactWidth / 2"
        [attr.y]="-node.compactHeight / 2"
        [attr.width]="node.compactWidth"
        [attr.height]="node.compactHeight"
        rx="11"
        [attr.fill]="selectedNodeId() === node.id ? '#ecfdf5' : node.component ? '#eef2ff' : node.loopMember ? '#fffbeb' : '#ffffff'"
        [attr.stroke]="isSubtreeAnchor(node.id) ? '#0f766e' : isSubtreeNodeSelected(node.id) ? '#14b8a6' : selectedNodeId() === node.id ? '#047857' : node.component ? '#818cf8' : node.loopMember ? '#f59e0b' : '#d6d3d1'"
        [attr.stroke-width]="isSubtreeAnchor(node.id) ? 4 : isSubtreeNodeSelected(node.id) ? 3.5 : selectedNodeId() === node.id ? 3 : 2"
        class="drop-shadow-sm transition-[fill,stroke,stroke-width]"
      />
      <rect
        [attr.x]="-node.compactWidth / 2 + 7"
        [attr.y]="-node.compactHeight / 2 + 8"
        width="4"
        [attr.height]="node.compactHeight - 16"
        rx="2"
        [attr.fill]="node.component ? '#6366f1' : node.hasGraphic ? '#059669' : '#a8a29e'"
        class="pointer-events-none"
      />
      <text
        [attr.x]="-node.compactWidth / 2 + 17"
        y="-2"
        class="pointer-events-none fill-stone-800 text-[10px] font-bold"
      >{{ node.compactLabel }}</text>
      <text
        [attr.x]="-node.compactWidth / 2 + 17"
        y="12"
        class="pointer-events-none fill-stone-400 text-[7px] font-black tracking-[.08em]"
      >{{ node.root && node.compactType !== 'START' ? 'START · ' : '' }}{{ node.compactType }}</text>
      @if (node.componentDefinitionId; as definitionId) {
        <g
          class="cursor-pointer outline-none"
          [attr.transform]="'translate(' + (node.compactWidth / 2 - 14) + ' ' + (-node.compactHeight / 2 + 14) + ')'"
          tabindex="0"
          role="link"
          (pointerdown)="openComponent($event, definitionId)"
          (keydown.enter)="openComponent($event, definitionId)"
          (keydown.space)="openComponent($event, definitionId)"
        >
          <rect x="-10" y="-10" width="20" height="20" rx="6" fill="#ffffff" stroke="#c7d2fe" stroke-width="1" />
          <path d="M-4 4 4-4M0-4h4v4" fill="none" stroke="#4338ca" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
          <title>Quelldefinition öffnen</title>
        </g>
      }
      @if (!node.root) {
        <circle
          [attr.cx]="node.compactInputPoint.x - node.x"
          [attr.cy]="node.compactInputPoint.y - node.y"
          r="7"
          fill="#ffffff"
          stroke="#78716c"
          stroke-width="2"
          (pointerup)="finishConnection($event, node.id)"
        />
      }
      @for (port of node.compactOutputPoints; track $index) {
        <g
          class="cursor-crosshair"
          (pointerdown)="startCompactPortConnection($event, node.id, $index)"
        >
          <circle [attr.cx]="port.x - node.x" [attr.cy]="port.y - node.y" r="14" fill="transparent" />
          <circle [attr.cx]="port.x - node.x" [attr.cy]="port.y - node.y" r="7" fill="#064e3b" stroke="#ffffff" stroke-width="2" />
          @if (port.label) {
            <text [attr.x]="port.x - node.x" [attr.y]="port.y - node.y + 2.5" class="pointer-events-none fill-white text-[6px] font-black [text-anchor:middle]">{{ port.label }}</text>
          }
          <title>{{ port.name || 'Ausgang ' + ($index + 1) }}</title>
        </g>
      }
      <title>{{ node.name }}</title>
    </g>
    }
  }

  @for (loop of compactGraph().loops; track loop.id) {
    <g [attr.opacity]="isActiveNode(loop.id) ? 1 : 0.72">
      @if (!loop.root) {
        <circle
          [attr.cx]="loop.inputPoint.x"
          [attr.cy]="loop.inputPoint.y"
          r="7"
          fill="#ffffff"
          stroke="#a8a29e"
          stroke-width="2.5"
          class="pointer-events-auto"
          (pointerup)="finishConnection($event, loop.id)"
        />
      }
      @for (port of loop.outputPoints; track $index) {
        <g
          class="pointer-events-auto cursor-crosshair"
          (pointerdown)="startCompactPortConnection($event, loop.id, $index)"
        >
          <circle [attr.cx]="port.x" [attr.cy]="port.y" r="15" fill="transparent" />
          <circle [attr.cx]="port.x" [attr.cy]="port.y" r="7" fill="#064e3b" stroke="#ffffff" stroke-width="2.5" />
          @if (port.label) {
            <text [attr.x]="port.x" [attr.y]="port.y + 2.5" class="pointer-events-none fill-white text-[6px] font-black [text-anchor:middle]">{{ port.label }}</text>
          }
          <title>{{ port.name || 'Ausgang ' + ($index + 1) }}</title>
        </g>
      }
    </g>
  }

</svg>
