<mat-slider
  class="-my-2! mx-0! h-12! w-full! min-w-0! max-w-none! [--mat-slider-active-track-color:var(--color-emerald-950)] [--mat-slider-active-track-height:3px] [--mat-slider-disabled-active-track-color:var(--color-stone-500)] [--mat-slider-disabled-handle-color:var(--color-stone-500)] [--mat-slider-disabled-inactive-track-color:var(--color-stone-400)] [--mat-slider-focus-handle-color:var(--color-emerald-950)] [--mat-slider-focus-state-layer-color:rgb(2_44_34/16%)] [--mat-slider-handle-color:var(--color-emerald-950)] [--mat-slider-handle-elevation:none] [--mat-slider-handle-height:18px] [--mat-slider-handle-shape:3px] [--mat-slider-handle-width:6px] [--mat-slider-hover-handle-color:var(--color-emerald-950)] [--mat-slider-hover-state-layer-color:rgb(2_44_34/8%)] [--mat-slider-inactive-track-color:var(--color-stone-500)] [--mat-slider-inactive-track-height:3px] [--mat-slider-label-container-color:var(--color-emerald-950)] [--mat-slider-label-label-text-color:var(--color-white)] [--mat-slider-ripple-color:var(--color-emerald-950)] [--mat-slider-with-overlap-handle-outline-color:var(--color-stone-50)] [--mat-slider-with-overlap-handle-outline-width:1px] [&_.mat-mdc-slider-active-ripple]:scale-50 [&_.mat-mdc-slider-focus-ripple]:scale-50 [&_.mat-mdc-slider-hover-ripple]:scale-50"
  [min]="minimum()"
  [max]="maximum()"
  [step]="step()"
  [discrete]="true"
>
  @if (endValue() === null) {
    <input
      matSliderThumb
      [id]="inputId()"
      [attr.aria-label]="ariaLabel()"
      [value]="value()"
      (input)="emitValue($event, 'value')"
      (pointerdown)="dragStart.emit('first')"
      (pointerup)="dragEnd.emit()"
      (pointercancel)="dragEnd.emit()"
      (keydown)="dragStart.emit('first')"
      (keyup)="dragEnd.emit()"
    >
  } @else {
    <input
      matSliderStartThumb
      [attr.aria-label]="ariaLabel() + ' Minimum'"
      [value]="value()"
      (input)="emitValue($event, 'value')"
      (pointerdown)="dragStart.emit('first')"
      (pointerup)="dragEnd.emit()"
      (pointercancel)="dragEnd.emit()"
      (keydown)="dragStart.emit('first')"
      (keyup)="dragEnd.emit()"
    >
    <input
      matSliderEndThumb
      [attr.aria-label]="ariaLabel() + ' Maximum'"
      [value]="endValue()"
      (input)="emitValue($event, 'end')"
      (pointerdown)="dragStart.emit('second')"
      (pointerup)="dragEnd.emit()"
      (pointercancel)="dragEnd.emit()"
      (keydown)="dragStart.emit('second')"
      (keyup)="dragEnd.emit()"
    >
  }
</mat-slider>
