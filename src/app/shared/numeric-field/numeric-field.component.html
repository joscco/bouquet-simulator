<label class="block min-w-0">
  <span class="mb-[5px] block text-[11px] font-semibold leading-tight text-stone-600">
    {{ label() }}
  </span>
  <span class="flex h-9 w-full items-center overflow-hidden rounded-lg border border-stone-300 bg-white transition-[border-color,box-shadow] focus-within:border-emerald-950 focus-within:ring-3 focus-within:ring-emerald-950/10">
    <input
      appDragNumberInput
      #numberInput
      class="h-full min-w-0 flex-1 appearance-none border-0 bg-transparent px-2.5 text-xs font-medium leading-none text-stone-800 outline-none [appearance:textfield] [&::-webkit-inner-spin-button]:m-0 [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:m-0 [&::-webkit-outer-spin-button]:appearance-none"
      type="number"
      inputmode="decimal"
      autocomplete="off"
      [attr.aria-label]="label()"
      [min]="minimum()"
      [max]="maximum()"
      [step]="step()"
      [value]="value()"
      [dragValue]="value()"
      [dragMinimum]="minimum()"
      [dragMaximum]="maximum()"
      [dragStep]="step()"
      (dragValueChange)="setValue($event)"
      (input)="setValue(numberInput.valueAsNumber)"
      (wheel)="numberInput.blur()"
      (keydown.pageup)="setValue(value() + step() * 10); $event.preventDefault()"
      (keydown.pagedown)="setValue(value() - step() * 10); $event.preventDefault()"
    >
    @if (unit()) {
      <span class="shrink-0 pr-2.5 text-[10px] text-stone-500">{{ unit() }}</span>
    }
  </span>
</label>
