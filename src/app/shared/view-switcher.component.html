<div
  class="fixed right-4 top-4 z-50 grid h-9 w-[200px] max-w-[calc(100vw-2rem)] grid-cols-2 items-center overflow-hidden rounded-lg p-1 shadow-md shadow-stone-900/10 backdrop-blur-md"
  role="tablist"
  [attr.aria-label]="'views.label' | transloco"
>
  <span
    class="absolute inset-y-1 left-1 w-[calc(50%-4px)] rounded-md bg-emerald-950 shadow-sm motion-reduce:transition-none"
    [class.translate-x-full]="activeView() === 'components'"
    [class.transition-transform]="viewSwitchAnimated()"
    [class.duration-200]="viewSwitchAnimated()"
    [class.ease-out]="viewSwitchAnimated()"
    aria-hidden="true"
  ></span>
  <button
    #bouquetViewButton
    class="relative z-10 h-7 min-w-0 cursor-pointer rounded-md border-0 bg-transparent px-2 text-xs font-bold text-stone-500 transition-colors focus-visible:outline-2 focus-visible:outline-offset-1 focus-visible:outline-emerald-600"
    type="button"
    role="tab"
    [class.text-white]="activeView() === 'bouquet'"
    [attr.aria-selected]="activeView() === 'bouquet'"
    [attr.tabindex]="activeView() === 'bouquet' ? 0 : -1"
    (click)="selectView('bouquet')"
    (keydown.arrowright)="$event.preventDefault(); selectView('components'); componentsViewButton.focus()"
  >
    {{ 'views.bouquet' | transloco }}
  </button>
  <button
    #componentsViewButton
    class="relative z-10 h-7 min-w-0 cursor-pointer rounded-md border-0 bg-transparent px-2 text-xs font-bold text-stone-500 transition-colors focus-visible:outline-2 focus-visible:outline-offset-1 focus-visible:outline-emerald-600"
    type="button"
    role="tab"
    [class.text-white]="activeView() === 'components'"
    [attr.aria-selected]="activeView() === 'components'"
    [attr.tabindex]="activeView() === 'components' ? 0 : -1"
    (click)="selectView('components')"
    (keydown.arrowleft)="$event.preventDefault(); selectView('bouquet'); bouquetViewButton.focus()"
  >
    {{ 'views.components' | transloco }}
  </button>
</div>

<div
  class="fixed right-4 top-16 z-50 grid h-9 w-[80px] grid-cols-2 items-center overflow-hidden rounded-lg p-1 shadow-md shadow-stone-900/10 backdrop-blur-md sm:bottom-4 sm:top-auto"
  role="group"
  [attr.aria-label]="'language.label' | transloco"
>
  <span
    class="absolute inset-y-1 left-1 w-[calc(50%-4px)] rounded-md bg-emerald-950 shadow-sm motion-reduce:transition-none"
    [class.translate-x-full]="activeLanguage() === 'en'"
    [class.transition-transform]="languageSwitchAnimated()"
    [class.duration-200]="languageSwitchAnimated()"
    [class.ease-out]="languageSwitchAnimated()"
    aria-hidden="true"
  ></span>
  <button
    #germanLanguageButton
    class="relative z-10 h-7 min-w-0 cursor-pointer rounded-md border-0 bg-transparent px-1 text-xs font-bold text-stone-500 transition-colors focus-visible:outline-2 focus-visible:outline-offset-1 focus-visible:outline-emerald-600"
    type="button"
    [class.text-white]="activeLanguage() === 'de'"
    [attr.aria-pressed]="activeLanguage() === 'de'"
    [attr.aria-label]="'language.de' | transloco"
    (click)="selectLanguage('de')"
    (keydown.arrowright)="$event.preventDefault(); selectLanguage('en'); englishLanguageButton.focus()"
  >
    DE
  </button>
  <button
    #englishLanguageButton
    class="relative z-10 h-7 min-w-0 cursor-pointer rounded-md border-0 bg-transparent px-1 text-xs font-bold text-stone-500 transition-colors focus-visible:outline-2 focus-visible:outline-offset-1 focus-visible:outline-emerald-600"
    type="button"
    [class.text-white]="activeLanguage() === 'en'"
    [attr.aria-pressed]="activeLanguage() === 'en'"
    [attr.aria-label]="'language.en' | transloco"
    (click)="selectLanguage('en')"
    (keydown.arrowleft)="$event.preventDefault(); selectLanguage('de'); germanLanguageButton.focus()"
  >
    EN
  </button>
</div>
