<nav
  class="absolute gap-1 right-4 top-4 z-50 flex max-w-[calc(100vw-2rem)] items-center rounded-xl border border-white/70 bg-white/85 p-1 shadow-md shadow-stone-900/10 backdrop-blur-md"
  [attr.aria-label]="'views.label' | transloco"
>
  <a
    class="rounded-lg px-3 py-2 text-xs font-bold transition hover:bg-stone-100 hover:text-stone-900"
    [class.bg-emerald-950]="activeView() === 'bouquet'"
    [class.text-white]="activeView() === 'bouquet'"
    [class.shadow-sm]="activeView() === 'bouquet'"
    [class.text-stone-600]="activeView() !== 'bouquet'"
    routerLink="/"
    [attr.aria-current]="activeView() === 'bouquet' ? 'page' : null"
  >
    {{ 'views.bouquet' | transloco }}
  </a>
  <a
    class="rounded-lg px-3 py-2 text-xs font-bold transition hover:bg-stone-100 hover:text-stone-900"
    [class.bg-emerald-950]="activeView() === 'components'"
    [class.text-white]="activeView() === 'components'"
    [class.shadow-sm]="activeView() === 'components'"
    [class.text-stone-600]="activeView() !== 'components'"
    routerLink="/editor"
    [attr.aria-current]="activeView() === 'components' ? 'page' : null"
  >
    {{ 'views.components' | transloco }}
  </a>
</nav>

<div
  class="fixed bottom-4 right-4 z-50 flex items-center gap-1 rounded-xl border border-white/70 bg-white/85 p-1 shadow-md shadow-stone-900/10 backdrop-blur-md"
  role="group"
  [attr.aria-label]="'language.label' | transloco"
>
  <button
    class="grid size-9 cursor-pointer place-items-center rounded-lg border-0 bg-transparent text-xl leading-none transition hover:bg-stone-100 focus-visible:outline-2 focus-visible:outline-offset-1 focus-visible:outline-emerald-600"
    type="button"
    [class.bg-emerald-950]="activeLanguage() === 'de'"
    [class.shadow-sm]="activeLanguage() === 'de'"
    [attr.aria-pressed]="activeLanguage() === 'de'"
    [attr.aria-label]="'language.de' | transloco"
    [attr.title]="'language.de' | transloco"
    (click)="setLanguage('de')"
  >
    <span aria-hidden="true">🇩🇪</span>
  </button>
  <button
    class="grid size-9 cursor-pointer place-items-center rounded-lg border-0 bg-transparent text-xl leading-none transition hover:bg-stone-100 focus-visible:outline-2 focus-visible:outline-offset-1 focus-visible:outline-emerald-600"
    type="button"
    [class.bg-emerald-950]="activeLanguage() === 'en'"
    [class.shadow-sm]="activeLanguage() === 'en'"
    [attr.aria-pressed]="activeLanguage() === 'en'"
    [attr.aria-label]="'language.en' | transloco"
    [attr.title]="'language.en' | transloco"
    (click)="setLanguage('en')"
  >
    <span aria-hidden="true">🇬🇧</span>
  </button>
</div>
