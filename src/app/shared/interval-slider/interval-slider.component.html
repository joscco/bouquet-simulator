<div class="mb-[5px] flex min-h-6 items-center justify-between gap-2">
  <span class="text-[11px] font-semibold leading-tight text-stone-600">{{ label() }}</span>
  @if (modeSelectable()) {
    <span
      class="inline-flex shrink-0 rounded-md bg-stone-100 p-0.5"
      role="group"
      [attr.aria-label]="label() + ' Eingabemodus'"
    >
      <button
        class="rounded px-1.5 py-1 text-[9px] font-bold transition"
        type="button"
        [class.bg-white]="fixedMode()"
        [class.text-emerald-900]="fixedMode()"
        [class.shadow-sm]="fixedMode()"
        [class.text-stone-500]="!fixedMode()"
        [attr.aria-pressed]="fixedMode()"
        (click)="setMode('fixed')"
      >Festwert</button>
      <button
        class="rounded px-1.5 py-1 text-[9px] font-bold transition"
        type="button"
        [class.bg-white]="!fixedMode()"
        [class.text-emerald-900]="!fixedMode()"
        [class.shadow-sm]="!fixedMode()"
        [class.text-stone-500]="fixedMode()"
        [attr.aria-pressed]="!fixedMode()"
        (click)="setMode('interval')"
      >Intervall</button>
    </span>
  }
</div>

<div class="grid grid-cols-[minmax(0,1fr)_auto] items-center gap-2.5 @max-[230px]:grid-cols-1 @max-[230px]:gap-[5px]">
  @if (fixedMode() && modeSelectable()) {
    <mat-slider class="h-9! min-w-0! w-full!" [min]="minimum()" [max]="maximum()" [step]="step()">
      <input
        matSliderThumb
        [attr.aria-label]="label() + ' Wert'"
        [value]="firstHandle()"
        (input)="setFixed(+$any($event.target).value)"
        (pointerdown)="startDrag('first')"
        (pointerup)="stopDrag()"
        (pointercancel)="stopDrag()"
        (keydown)="startDrag('first')"
        (keyup)="stopDrag()"
      >
    </mat-slider>
  } @else {
    <mat-slider class="h-9! min-w-0! w-full!" [min]="minimum()" [max]="maximum()" [step]="step()">
      <input
        matSliderStartThumb
        [attr.aria-label]="label() + ' Minimum'"
        [value]="firstHandle()"
        (input)="setFirst(+$any($event.target).value)"
        (pointerdown)="startDrag('first')"
        (pointerup)="stopDrag()"
        (pointercancel)="stopDrag()"
        (keydown)="startDrag('first')"
        (keyup)="stopDrag()"
      >
      <input
        matSliderEndThumb
        [attr.aria-label]="label() + ' Maximum'"
        [value]="secondHandle()"
        (input)="setSecond(+$any($event.target).value)"
        (pointerdown)="startDrag('second')"
        (pointerup)="stopDrag()"
        (pointercancel)="stopDrag()"
        (keydown)="startDrag('second')"
        (keyup)="stopDrag()"
      >
    </mat-slider>
  }

  <div class="grid w-[118px] min-w-0 grid-cols-[minmax(0,1fr)_auto_minmax(0,1fr)_auto] items-center gap-1 @max-[230px]:w-full">
    <input
      #minimumInput
      class="col-start-1 h-9 w-full min-w-0 appearance-none rounded-lg border border-stone-300 bg-white px-[7px] text-[11px] font-medium leading-none text-stone-800 outline-none focus-visible:border-emerald-700 focus-visible:ring-3 focus-visible:ring-emerald-700/10 [appearance:textfield] [&::-webkit-inner-spin-button]:m-0 [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:m-0 [&::-webkit-outer-spin-button]:appearance-none"
      [class.col-span-3]="fixedMode() && modeSelectable()"
      type="number"
      [attr.aria-label]="label() + (fixedMode() && modeSelectable() ? ' Wert' : ' Minimum')"
      [min]="minimum()"
      [max]="maximum()"
      [step]="step()"
      [value]="sortedValue().min"
      (input)="fixedMode() && modeSelectable() ? setFixed(minimumInput.valueAsNumber) : setMinimum(minimumInput.valueAsNumber)"
    >
    @if (!fixedMode() || !modeSelectable()) {
      <span class="col-start-2 text-[9px] text-stone-500">–</span>
      <input
        #maximumInput
        class="col-start-3 h-9 w-full min-w-0 appearance-none rounded-lg border border-stone-300 bg-white px-[7px] text-[11px] font-medium leading-none text-stone-800 outline-none focus-visible:border-emerald-700 focus-visible:ring-3 focus-visible:ring-emerald-700/10 [appearance:textfield] [&::-webkit-inner-spin-button]:m-0 [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:m-0 [&::-webkit-outer-spin-button]:appearance-none"
        type="number"
        [attr.aria-label]="label() + ' Maximum'"
        [min]="minimum()"
        [max]="maximum()"
        [step]="step()"
        [value]="sortedValue().max"
        (input)="setMaximum(maximumInput.valueAsNumber)"
      >
    }
    @if (unit().trim()) {
      <span class="col-start-4 text-[9px] text-stone-500">{{ unit().trim() }}</span>
    }
  </div>
</div>
