<div class="mb-[5px] flex min-h-6 items-center justify-between gap-2">
  <span class="text-[11px] font-semibold leading-tight text-stone-600">{{ label() }}</span>
  @if (modeSelectable()) {
    <span
      class="inline-flex shrink-0 rounded-md bg-stone-100 p-0.5"
      role="group"
      [attr.aria-label]="label() + ' ' + ('common.inputMode' | transloco)"
    >
      <button
        class="rounded px-1.5 py-1 text-[9px] font-bold transition"
        type="button"
        [class.bg-white]="fixedMode()"
        [class.text-emerald-900]="fixedMode()"
        [class.shadow-sm]="fixedMode()"
        [class.text-stone-500]="!fixedMode()"
        [attr.aria-pressed]="fixedMode()"
        (click)="setMode('fixed')"
      >{{ 'common.fixed' | transloco }}</button>
      <button
        class="rounded px-1.5 py-1 text-[9px] font-bold transition"
        type="button"
        [class.bg-white]="!fixedMode()"
        [class.text-emerald-900]="!fixedMode()"
        [class.shadow-sm]="!fixedMode()"
        [class.text-stone-500]="fixedMode()"
        [attr.aria-pressed]="!fixedMode()"
        (click)="setMode('interval')"
      >{{ 'common.interval' | transloco }}</button>
    </span>
  }
</div>

<div class="grid grid-cols-[minmax(0,1fr)_auto] items-center gap-2.5 @max-[250px]:grid-cols-1 @max-[250px]:gap-[5px]">
  @if (fixedMode() && modeSelectable()) {
    <app-slider-track
      [minimum]="minimum()"
      [maximum]="maximum()"
      [step]="step()"
      [value]="firstHandle()"
      [ariaLabel]="label() + ' Wert'"
      (valueChange)="setFixed($event)"
      (dragStart)="startDrag($event)"
      (dragEnd)="stopDrag()"
    />
  } @else {
    <app-slider-track
      [minimum]="minimum()"
      [maximum]="maximum()"
      [step]="step()"
      [value]="firstHandle()"
      [endValue]="secondHandle()"
      [ariaLabel]="label()"
      (valueChange)="setFirst($event)"
      (endValueChange)="setSecond($event)"
      (dragStart)="startDrag($event)"
      (dragEnd)="stopDrag()"
    />
  }

  <div class="grid w-[122px] min-w-0 grid-cols-[minmax(0,1fr)_auto_minmax(0,1fr)_auto] items-center gap-1 @max-[250px]:w-full">
    <input
      #minimumInput
      class="col-start-1 h-9 w-full min-w-0 appearance-none rounded-lg border border-stone-300 bg-white px-[7px] text-[11px] font-medium leading-none text-stone-800 outline-none transition-[border-color,box-shadow] focus-visible:border-emerald-700 focus-visible:ring-3 focus-visible:ring-emerald-700/10 [appearance:textfield] [&::-webkit-inner-spin-button]:m-0 [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:m-0 [&::-webkit-outer-spin-button]:appearance-none"
      [class.col-span-3]="fixedMode() && modeSelectable()"
      type="number"
      [attr.aria-label]="label() + (fixedMode() && modeSelectable() ? ' Wert' : ' Minimum')"
      [min]="minimum()"
      [max]="maximum()"
      [step]="step()"
      [value]="sortedValue().min"
      (input)="fixedMode() && modeSelectable() ? setFixed(minimumInput.valueAsNumber) : setMinimum(minimumInput.valueAsNumber)"
    >
    @if (!fixedMode() || !modeSelectable()) {
      <span class="col-start-2 text-[9px] text-stone-500">–</span>
      <input
        #maximumInput
        class="col-start-3 h-9 w-full min-w-0 appearance-none rounded-lg border border-stone-300 bg-white px-[7px] text-[11px] font-medium leading-none text-stone-800 outline-none transition-[border-color,box-shadow] focus-visible:border-emerald-700 focus-visible:ring-3 focus-visible:ring-emerald-700/10 [appearance:textfield] [&::-webkit-inner-spin-button]:m-0 [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:m-0 [&::-webkit-outer-spin-button]:appearance-none"
        type="number"
        [attr.aria-label]="label() + ' Maximum'"
        [min]="minimum()"
        [max]="maximum()"
        [step]="step()"
        [value]="sortedValue().max"
        (input)="setMaximum(maximumInput.valueAsNumber)"
      >
    }
    @if (unit().trim()) {
      <span class="col-start-4 text-[9px] text-stone-500">{{ unit().trim() }}</span>
    }
  </div>
</div>
