@if (!renderVisible()) {
  <span class="grid h-full w-full place-items-center text-stone-300" aria-hidden="true">
    <svg class="size-7 fill-none stroke-current stroke-[1.5] [stroke-linecap:round] [stroke-linejoin:round]" viewBox="0 0 24 24">
      <path d="M12 20v-9m0 3c-3.8 0-6-2.1-6-5.8 3.8 0 6 2.1 6 5.8Zm0-3.2c3.8 0 6-2.1 6-5.8-3.8 0-6 2.1-6 5.8Z"/>
    </svg>
  </span>
} @else if (snapshot(); as imageUrl) {
  <img class="h-full w-full object-contain" [src]="imageUrl" alt="" (error)="handleSnapshotError()">
} @else if (renderActive()) {
  <app-bouquet-canvas
    class="block h-full w-full"
    [state]="previewState()"
    [definitions]="previewDefinitions()"
    [fitToContent]="true"
    [zoom]="0.9"
    [thumbnailMode]="true"
    [snapshotKey]="snapshotKey()"
    (snapshotReady)="storeSnapshot($event)"
  />
} @else {
  <span class="grid h-full w-full place-items-center text-stone-300" aria-hidden="true">
    <svg class="size-7 animate-pulse fill-none stroke-current stroke-[1.5] [stroke-linecap:round] [stroke-linejoin:round]" viewBox="0 0 24 24">
      <path d="M12 20v-9m0 3c-3.8 0-6-2.1-6-5.8 3.8 0 6 2.1 6 5.8Zm0-3.2c3.8 0 6-2.1 6-5.8-3.8 0-6 2.1-6 5.8Z"/>
    </svg>
  </span>
}
