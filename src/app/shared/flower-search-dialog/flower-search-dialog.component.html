<div
  [class]="contained()
    ? 'absolute inset-0 z-[110] flex items-center justify-center overflow-hidden bg-stone-950/35 p-3 backdrop-blur-sm'
    : 'fixed inset-0 z-[110] flex items-center justify-center overflow-hidden bg-stone-950/35 p-2 pb-2 pt-[4.5rem] backdrop-blur-sm sm:p-3 sm:pb-3 sm:pt-[4.75rem]'"
  role="presentation"
  (click)="close.emit()"
>
  <section
    [class]="contained()
      ? 'flex h-full max-h-[42rem] min-h-0 w-full max-w-3xl flex-col overflow-hidden rounded-2xl border border-white/70 bg-white shadow-2xl'
      : 'flex h-[min(42rem,calc(100dvh-5rem))] min-h-0 w-full max-w-3xl flex-col overflow-hidden rounded-2xl border border-white/70 bg-white shadow-2xl sm:h-[min(42rem,calc(100dvh-5.5rem))] sm:rounded-3xl'"
    role="dialog"
    aria-modal="true"
    aria-labelledby="flower-search-title"
    (click)="$event.stopPropagation()"
  >
    <header class="flex shrink-0 items-center gap-3 border-b border-stone-200 p-3 sm:p-4">
      <h2 id="flower-search-title" class="m-0 min-w-0 flex-1 truncate text-base font-semibold tracking-tight text-stone-900">{{ title() }}</h2>
      @if (definitionActions()) {
        <div class="flex shrink-0 items-center gap-1 border-r border-stone-200 pr-2">
          <button
            data-definition-action="create"
            class="grid size-9 cursor-pointer place-items-center rounded-lg border-0 bg-transparent text-stone-500 transition-colors hover:bg-emerald-50 hover:text-emerald-800 focus-visible:outline-2 focus-visible:outline-offset-1 focus-visible:outline-emerald-600"
            type="button"
            [attr.aria-label]="'editor.new' | transloco"
            [title]="'editor.new' | transloco"
            (click)="createDefinition.emit()"
          >
            <mat-icon class="size-[19px]! text-[19px]! leading-[19px]!">add</mat-icon>
          </button>
          <button
            data-definition-action="load"
            class="grid size-9 cursor-pointer place-items-center rounded-lg border-0 bg-transparent text-stone-500 transition-colors hover:bg-emerald-50 hover:text-emerald-800 focus-visible:outline-2 focus-visible:outline-offset-1 focus-visible:outline-emerald-600"
            type="button"
            [attr.aria-label]="'editor.load' | transloco"
            [title]="'editor.load' | transloco"
            (click)="loadDefinition.emit()"
          >
            <mat-icon class="size-[19px]! text-[19px]! leading-[19px]!">upload_file</mat-icon>
          </button>
        </div>
      }
      <button class="grid size-9 shrink-0 cursor-pointer place-items-center rounded-lg border-0 bg-transparent text-stone-500 transition-colors hover:bg-stone-100 hover:text-stone-900 focus-visible:outline-2 focus-visible:outline-offset-1 focus-visible:outline-emerald-600" type="button" [attr.aria-label]="'common.close' | transloco" (click)="close.emit()">
        <mat-icon class="size-5! text-[20px]! leading-5!">close</mat-icon>
      </button>
    </header>

    @if (primaryActionLabel()) {
      <button
        data-primary-action
        class="group mx-3 mt-3 flex min-h-14 shrink-0 cursor-pointer items-center gap-3 rounded-xl border border-emerald-200 bg-emerald-50/70 px-3 py-2.5 text-left transition-colors hover:border-emerald-400 hover:bg-emerald-50 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-700 sm:mx-4"
        type="button"
        (click)="primaryAction.emit()"
      >
        <span class="grid size-9 shrink-0 place-items-center rounded-lg bg-emerald-900 text-white">
          <mat-icon class="size-5! text-[20px]! leading-5!">{{ primaryActionIcon() }}</mat-icon>
        </span>
        <span class="min-w-0 flex-1">
          <strong class="block truncate text-sm font-semibold text-emerald-950">{{ primaryActionLabel() }}</strong>
          @if (primaryActionDescription()) {
            <span class="mt-0.5 block text-[10px] leading-snug text-emerald-800/70">{{ primaryActionDescription() }}</span>
          }
        </span>
        <mat-icon class="size-5! shrink-0 text-[20px]! leading-5! text-emerald-700 transition-transform group-hover:translate-x-0.5">arrow_forward</mat-icon>
      </button>
    }

    <label class="relative mx-3 mt-3 block shrink-0 sm:mx-4 sm:mt-4">
      <mat-icon class="pointer-events-none absolute left-3 top-1/2 size-5! -translate-y-1/2 text-[20px]! leading-5! text-stone-400">search</mat-icon>
      <input
        class="h-11 w-full rounded-xl border border-stone-300 bg-stone-50 pl-10 pr-3 text-sm text-stone-800 outline-none transition pointer-coarse:text-base focus:border-emerald-700 focus:bg-white focus:ring-3 focus:ring-emerald-700/10"
        type="search"
        autofocus
        [attr.aria-label]="placeholder()"
        [placeholder]="placeholder()"
        [value]="query()"
        (input)="query.set($any($event.target).value)"
        (keydown.escape)="close.emit(); $event.stopPropagation()"
      >
    </label>

    <div class="min-h-0 flex-1 overflow-hidden py-3 pr-1">
    <div
      class="grid h-full auto-rows-max grid-cols-2 content-start items-start gap-2 overflow-y-auto px-3 py-1 [&::-webkit-scrollbar]:w-2.5 [&::-webkit-scrollbar-button]:hidden [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-thumb]:border-2 [&::-webkit-scrollbar-thumb]:border-solid [&::-webkit-scrollbar-thumb]:border-stone-100 [&::-webkit-scrollbar-thumb]:bg-stone-400 [&::-webkit-scrollbar-track]:my-1 [&::-webkit-scrollbar-track]:rounded-full [&::-webkit-scrollbar-track]:bg-stone-100 sm:grid-cols-3 sm:gap-3 sm:px-4 md:grid-cols-4"
      role="listbox"
    >
      @for (entry of filteredEntries(); track entry.id) {
        <button
          class="group relative block aspect-square w-full min-w-0 overflow-hidden rounded-2xl border border-stone-200 bg-white text-left transition hover:-translate-y-0.5 hover:border-emerald-300 hover:shadow-md focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-700"
          type="button"
          role="option"
          (click)="entrySelect.emit(entry.id)"
        >
          <span class="absolute inset-x-0 bottom-9 top-0 overflow-hidden bg-[radial-gradient(circle_at_50%_55%,rgba(255,255,255,1),rgba(245,245,244,.55)_65%,rgba(231,229,228,.7))] p-2">
            <app-flower-thumbnail class="transition duration-200 group-hover:scale-[1.04]" [definition]="entry.definition" />
          </span>
          <span class="absolute inset-x-0 bottom-0 flex h-9 min-w-0 items-center justify-center border-t border-stone-200/80 bg-white px-2">
          <strong class="flex min-w-0 overflow-hidden whitespace-nowrap text-center text-xs font-semibold text-stone-800 sm:text-sm">
            @for (segment of highlighted(entry.name); track $index) {
              @if (segment.match) {
                <mark class="shrink-0 rounded-sm bg-amber-200 text-inherit">{{ segment.text }}</mark>
              } @else {
                <span class="shrink-0">{{ segment.text }}</span>
              }
            }
          </strong>
          </span>
        </button>
      } @empty {
        <div class="col-span-full px-4 py-10 text-center text-sm text-stone-400">{{ 'common.emptySearch' | transloco }}</div>
      }
    </div>
    </div>
  </section>
</div>
