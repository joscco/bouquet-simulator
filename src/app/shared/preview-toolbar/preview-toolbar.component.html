    <mat-icon class="size-5! text-[20px]! leading-5!">center_focus_strong</mat-icon>

  <button class="grid size-[34px] cursor-pointer place-items-center rounded-[7px] border border-transparent bg-transparent text-stone-600 transition-colors hover:bg-stone-100 hover:text-emerald-900 focus-visible:outline-2 focus-visible:outline-offset-1 focus-visible:outline-emerald-600 disabled:cursor-default disabled:opacity-40" type="button" [disabled]="disabled()" [attr.aria-label]="'editor.regenerate' | transloco" [attr.title]="'editor.regenerate' | transloco" (click)="regeneratePreview.emit()">
