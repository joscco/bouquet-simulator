<div class="mb-[5px] flex min-h-6 items-center justify-between gap-2">
  <label class="text-[11px] font-semibold leading-tight text-stone-600" [for]="inputId()">
    {{ label() }}
  </label>
</div>

<div class="grid grid-cols-[minmax(0,1fr)_auto] items-center gap-2.5 @max-[250px]:grid-cols-1 @max-[250px]:gap-[5px]">
  <app-slider-track
    [minimum]="minimum()"
    [maximum]="maximum()"
    [step]="step()"
    [value]="value()"
    [ariaLabel]="label()"
    (valueChange)="setValue($event)"
  />

  <div class="grid w-[122px] min-w-0 grid-cols-[minmax(0,1fr)_auto] items-center gap-1 @max-[250px]:w-full">
    <input
      appDragNumberInput
      #numberInput
      class="h-9 w-full min-w-0 appearance-none rounded-lg border border-stone-300 bg-white px-[7px] text-[11px] font-medium leading-none text-stone-800 outline-none transition-[border-color,box-shadow] focus-visible:border-emerald-950 focus-visible:ring-3 focus-visible:ring-emerald-950/10 [appearance:textfield] [&::-webkit-inner-spin-button]:m-0 [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:m-0 [&::-webkit-outer-spin-button]:appearance-none"
      type="number"
      inputmode="decimal"
      autocomplete="off"
      [id]="inputId()"
      [min]="minimum()"
      [max]="maximum()"
      [step]="step()"
      [value]="value()"
      [dragValue]="value()"
      [dragMinimum]="minimum()"
      [dragMaximum]="maximum()"
      [dragStep]="step()"
      (dragValueChange)="setValue($event)"
      (input)="setValue(numberInput.valueAsNumber)"
      (wheel)="numberInput.blur()"
      (keydown.pageup)="setValue(value() + step() * 10); $event.preventDefault()"
      (keydown.pagedown)="setValue(value() - step() * 10); $event.preventDefault()"
    >
    @if (unit().trim()) {
      <span class="text-[9px] text-stone-500">{{ unit().trim() }}</span>
    }
  </div>
</div>
