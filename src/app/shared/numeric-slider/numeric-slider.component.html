<label class="mb-[5px] block text-[11px] font-semibold leading-tight text-stone-600" [for]="inputId()">
  {{ label() }}
</label>
<div class="grid grid-cols-[minmax(0,1fr)_auto] items-center gap-2.5 @max-[150px]:grid-cols-1 @max-[150px]:gap-[5px]">
  <input
    #rangeInput
    class="m-0 h-5 w-full cursor-pointer accent-emerald-800"
    type="range"
    [attr.aria-label]="label()"
    [min]="minimum()"
    [max]="maximum()"
    [step]="step()"
    [value]="value()"
    (input)="setValue(rangeInput.valueAsNumber)"
  >
  <div class="flex h-9 w-[76px] items-center overflow-hidden rounded-lg border border-stone-300 bg-white transition-[border-color,box-shadow] focus-within:border-emerald-700 focus-within:ring-3 focus-within:ring-emerald-700/10 @max-[150px]:w-full">
    <input
      #numberInput
      class="h-full min-w-0 flex-1 appearance-none border-0 bg-transparent py-0 pl-[9px] pr-1.5 text-xs font-medium leading-none text-stone-800 outline-none [appearance:textfield] [&::-webkit-inner-spin-button]:m-0 [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:m-0 [&::-webkit-outer-spin-button]:appearance-none"
      type="number"
      [id]="inputId()"
      [min]="minimum()"
      [max]="maximum()"
      [step]="step()"
      [value]="value()"
      (input)="setValue(numberInput.valueAsNumber)"
    >
    @if (unit()) {
      <span class="shrink-0 pr-[9px] text-[9px] text-stone-500">{{ unit() }}</span>
    }
  </div>
</div>
